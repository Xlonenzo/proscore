services:
  - type: web
    name: passa
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: DATABASE_URL
        fromDatabase:
          name: passa-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true

databases:
  - name: passa-db
    plan: free
